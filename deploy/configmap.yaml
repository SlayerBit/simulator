apiVersion: v1
kind: ConfigMap
metadata:
  name: simulator-config
  namespace: simulator
data:
  NODE_ENV: "production"
  PORT: "4000"
  SIMULATOR_NAMESPACE: "simulator"
  ALLOWED_TARGET_NAMESPACES: "*"
  SIM_MAX_CONCURRENT: "3"
  SIM_MAX_DURATION_SECONDS: "900"
  SIM_MAX_INTENSITY_PERCENT: "90"
  SIM_MAX_LATENCY_MS: "2000"
  SIM_MAX_PACKET_LOSS_PERCENT: "50"
  CORS_ALLOWED_ORIGINS: ""
  GRAFANA_URL: ""
  BACKEND_BASE_URL: ""
  FRONTEND_BASE_URL: ""

