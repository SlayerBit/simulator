services:
  postgres:
    image: postgres:16-alpine
    container_name: simulator-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: simulator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d simulator"]
      interval: 10s
      timeout: 5s
      retries: 8

  prometheus:
    image: prom/prometheus:v3.7.2
    container_name: simulator-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      postgres:
        condition: service_healthy

  loki:
    image: grafana/loki:3.5.5
    container_name: simulator-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  grafana:
    image: grafana/grafana:12.2.0
    container_name: simulator-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on:
      - prometheus
      - loki
    volumes:
      - grafana_data:/var/lib/grafana

  backend:
    build:
      context: ../backend
    container_name: simulator-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/simulator?schema=public
      JWT_SECRET: change-me-in-production
      GRAFANA_URL: http://grafana:3000
      PROMETHEUS_URL: http://prometheus:9090
      LOKI_URL: http://loki:3100
      SIMULATOR_NAMESPACE: simulator
      FRONTEND_BASE_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    command: sh -c "npx prisma migrate deploy --schema=prisma/schema.prisma && node dist/index.js"

  frontend:
    build:
      context: ../frontend
    container_name: simulator-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
      NEXT_PUBLIC_GRAFANA_URL: http://localhost:3001
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  grafana_data:
