apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: simulator-ingress
  namespace: simulator
spec:
  rules:
    - host: simulator.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: simulator-frontend
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: simulator-backend
                port:
                  number: 80

