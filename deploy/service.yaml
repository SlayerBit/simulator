apiVersion: v1
kind: Service
metadata:
  name: simulator-backend
  namespace: simulator
spec:
  selector:
    app: simulator-backend
  ports:
    - name: http
      port: 80
      targetPort: 4000
---
apiVersion: v1
kind: Service
metadata:
  name: simulator-frontend
  namespace: simulator
spec:
  selector:
    app: simulator-frontend
  ports:
    - name: http
      port: 80
      targetPort: 3000

